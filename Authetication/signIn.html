<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900
        &family=Roboto:ital,wght@0,100..900;1,100..900
        &family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Authentication.css">
    <title>Sign In | College Management</title>
</head>

<body>
    <div class="container">
        <div class="form-box">
            <h2>Sign In</h2>
            <!-- Add ID to the form -->
            <form id="signin-form">
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="extra-links">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit">Sign In</button>
                <p class="switch-text">
                    Don't have an account? <a href="signUp.html">Sign Up</a>
                </p>
            </form>
        </div>
    </div>

    <!-- connected dashboard -->
    <script>
        // JavaScript to handle form submission and redirect
        document.getElementById('signin-form').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent the form from submitting and refreshing the page
            window.location.href = '/dashboard/dashboard.html'; // Redirect to dashboard.html
        });
    </script>

    
</body>

</html>
